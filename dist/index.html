<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D 雷达回波体积渲染系统 | Volumetric Radar Echo Visualization</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    #app { width: 100%; height: 100%; position: relative; }
    #canvas-container { width: 100%; height: 100%; }
    #loading-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.92);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 1000; transition: opacity 0.6s ease;
    }
    #loading-overlay.hidden { opacity: 0; pointer-events: none; }
    .loader-title { font-size: 22px; font-weight: 300; margin-bottom: 24px; letter-spacing: 2px; color: #4fc3f7; }
    .spinner {
      width: 48px; height: 48px; border: 3px solid rgba(79, 195, 247, 0.2);
      border-top-color: #4fc3f7; border-radius: 50%; animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-progress { margin-top: 20px; font-size: 13px; color: #888; min-width: 200px; text-align: center; }
    .loader-bar { width: 260px; height: 3px; background: #1a1a1a; border-radius: 2px; overflow: hidden; margin-top: 16px; }
    .loader-bar-fill { height: 100%; background: linear-gradient(90deg, #4fc3f7, #ab47bc); width: 0%; transition: width 0.3s ease; }
    #info-panel {
      position: absolute; top: 16px; left: 16px; background: rgba(0,0,0,0.55);
      padding: 14px 18px; border-radius: 8px; backdrop-filter: blur(10px);
      border: 1px solid rgba(79, 195, 247, 0.2); font-size: 12px; line-height: 1.8;
      max-width: 280px; pointer-events: none; z-index: 10;
    }
    #info-panel h3 { color: #4fc3f7; font-size: 14px; font-weight: 500; margin-bottom: 8px; letter-spacing: 1px; }
    #info-panel .row { display: flex; justify-content: space-between; gap: 16px; }
    #info-panel .label { color: #888; }
    #info-panel .value { color: #e0e0e0; font-family: 'Consolas', monospace; }
    #controls-hint {
      position: absolute; bottom: 16px; left: 16px; color: #666; font-size: 11px;
      background: rgba(0,0,0,0.4); padding: 8px 12px; border-radius: 6px; z-index: 10;
    }
    #file-drop-zone {
      position: absolute; bottom: 16px; right: 16px; width: 260px; height: 70px;
      border: 2px dashed #444; border-radius: 8px; display: flex; align-items: center;
      justify-content: center; font-size: 12px; color: #666; z-index: 10;
      cursor: pointer; transition: all 0.2s; background: rgba(0,0,0,0.3);
    }
    #file-drop-zone:hover, #file-drop-zone.drag { border-color: #4fc3f7; color: #4fc3f7; background: rgba(79,195,247,0.05); }
    #file-input { display: none; }
  </style>
  <script type="module" crossorigin src="./assets/index-CEUoqhsn.js"></script>
  <link rel="modulepreload" crossorigin href="./assets/three-Bn1e_g2b.js">
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>

    <div id="loading-overlay">
      <div class="loader-title">RADAR VOLUME RENDERER</div>
      <div class="spinner"></div>
      <div class="loader-bar"><div class="loader-bar-fill" id="loader-fill"></div></div>
      <div class="loader-progress" id="loader-text">初始化系统中...</div>
    </div>

    <div id="info-panel">
      <h3>◈ 雷达体扫数据</h3>
      <div class="row"><span class="label">体素分辨率</span><span class="value" id="stat-resolution">-</span></div>
      <div class="row"><span class="label">数据范围</span><span class="value" id="stat-range">-</span></div>
      <div class="row"><span class="label">体素数量</span><span class="value" id="stat-count">-</span></div>
      <div class="row"><span class="label">渲染模式</span><span class="value" id="stat-mode">-</span></div>
    </div>

    <div id="controls-hint">
      鼠标左键: 旋转 &nbsp;|&nbsp; 右键: 平移 &nbsp;|&nbsp; 滚轮: 缩放
    </div>

    <label id="file-drop-zone" for="file-input">
      <span id="drop-text">📁 拖入 NetCDF 文件或点击上传</span>
      <input type="file" id="file-input" accept=".nc,.netcdf">
    </label>
  </div>

</body>
</html>
